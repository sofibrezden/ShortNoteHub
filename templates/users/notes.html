<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans&family=Raleway:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
        }

        header .logo {
            cursor: pointer;
            padding-top: 2rem;
            margin-left: 3rem;
        }

        header .logo img {
            width: 64%;
        }

        header nav ul {
            list-style: none;
            padding-top: 2rem;
        }

        header nav ul li {
            display: inline;
            margin-right: 3rem;
        }

        header nav ul li a {
            color: hsl(238, 22%, 44%);
            text-decoration: none;
            position: relative;
        }

        header nav ul li a::after {
            content: '';
            width: 0%;
            height: 0.2rem;
            background-color: hsl(224, 93%, 58%);
            position: absolute;
            border-radius: 1rem;
            bottom: -0.3rem;
            left: 50%;
            transition: 0.4s;
        }

        header nav ul li a:hover::after {
            width: 100%;
            left: 0;
        }

        .note-icon {
            transform: translateY(-50%);
            filter: hue-rotate(60deg);
            transition: transform 0.3s ease-in-out;
        }

        .note-icon:hover {
            transform: scale(0.4);
            transform: rotate(180deg)
        }

        .section-icons {
            display: flex;
            position: relative;
            align-items: center;

        }

        .section-icons img {
            position: absolute;
            width: 35px;
            right: 300px;
        }

        main {
            max-width: 1000px;
            margin: 20px auto;
            margin-top: 40px;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        .note-icon-notebook {
            width: 40px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            right: 0;
            margin-right: 10px;
        }

        .custom-section {
            max-width: 1000px;
            margin: 20px auto;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        @media only screen and (max-width: 600px) {
            header .logo {
                margin-left: 1rem;
            }

            header nav ul {
                padding-top: 1rem;
            }

            header nav ul li {
                margin-right: 1rem;
            }

            main {
                padding: 10px;
            }

            .section-icons img {
                right: 10px;
            }
        }

        @media only screen and (max-width: 400px) {
            header nav ul li {
                display: block;
                margin-right: 0;
                margin-bottom: 1rem;
            }

            .section-icons img {
                right: 5px;
            }
        }

    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="#"><img src="/templates/images/llogo.png" alt=""></a>
        </div>
        <nav>
            <ul>
                <li><a href="http://127.0.0.1:8000/">Home</a></li>
                <li><a href="/logout/">Log out</a></li>
            </ul>
        </nav>
    </header>

    <div class="section-icons">
        <a href="{% url 'create_note' %}"><img class="note-icon" src="/templates/images/plus.png" alt="Icon 1"></a>
        </div>


    <section class="custom-section">
        <main>
            {% if documents %}
            <ul>
                {% for document in documents %}
                <li style="border-bottom: 1px solid #eee; padding: 10px 0; position: relative;">
                    <strong><a href="{% url 'view_note' document.id %}">{{ document.title }}</a></strong>
                    <img class="note-icon-notebook" src="https://cdn-icons-png.flaticon.com/512/4659/4659027.png"
                        alt="Note Icon">
                    <br>
                    {{ document.content }}
                </li>
                {% endfor %}
            </ul>
            {% else %}
            <p>No notes found.</p>
            {% endif %}
        </main>
    </section>

</body>

</html>
